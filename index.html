<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HOLOGRAM · PARTICLE</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
  font-family: 'Courier New', monospace;
  touch-action: none;
  user-select: none;
}

/* Main canvas */
#main {
  position: fixed;
  inset: 0;
  display: block;
  width: 100% !important;
  height: 100% !important;
}

/* Camera preview */
#camBox {
  position: fixed;
  bottom: 70px; right: 12px;
  width: 120px; height: 90px;
  border: 1px solid rgba(0,255,180,.25);
  border-radius: 8px;
  overflow: hidden;
  z-index: 30;
  opacity: .65;
  transition: opacity .3s;
}
#camBox:hover { opacity: .95; }
#vid {
  position: absolute;
  width: 100%; height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
}
#camOverlay {
  position: absolute;
  width: 100%; height: 100%;
  z-index: 2;
  transform: scaleX(-1);
}

/* HUD top */
#hudTop {
  position: fixed; top: 0; left: 0; right: 0;
  padding: 13px 18px;
  display: flex; align-items: center; justify-content: space-between;
  z-index: 40; pointer-events: none;
}
.tiny { font-size: 8px; letter-spacing: 4px; color: rgba(255,255,255,.22); text-transform: uppercase; }
#pill {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 12px;
  border: 1px solid rgba(0,255,180,.14);
  border-radius: 20px;
  background: rgba(0,0,0,.55);
  backdrop-filter: blur(10px);
}
#gText {
  font-size: 8px; letter-spacing: 3px;
  color: rgba(0,255,180,.4); text-transform: uppercase;
  transition: color .3s, text-shadow .3s;
}
#gText.on { color: #00ffb4; text-shadow: 0 0 12px rgba(0,255,180,.9); }
#gDot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(0,255,180,.25);
  transition: background .3s, box-shadow .3s;
}
#gDot.on { background: #00ffb4; box-shadow: 0 0 8px #00ffb4; }

/* HUD bottom */
#hudBot {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 10px 18px;
  display: flex; align-items: center; justify-content: space-between;
  z-index: 40; pointer-events: none;
}
.hints { display: flex; gap: 10px; flex-wrap: wrap; }
.h { font-size: 7px; letter-spacing: 1.5px; color: rgba(255,255,255,.18); text-transform: uppercase; }
#pCount { font-size: 7px; letter-spacing: 2px; color: rgba(0,255,180,.22); }

/* Zoom indicator */
#zoomHud {
  position: fixed; right: 12px; top: 50%; transform: translateY(-50%);
  z-index: 40; pointer-events: none;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
#zBar {
  width: 2px; height: 90px;
  background: rgba(255,255,255,.06); border-radius: 2px; position: relative;
}
#zFill {
  position: absolute; bottom: 0; left: 0; right: 0;
  border-radius: 2px;
  background: linear-gradient(0deg, #00ffb4, rgba(0,255,180,.15));
  transition: height .08s;
  height: 40%;
}
#zVal { font-size: 7px; letter-spacing: 1px; color: rgba(0,255,180,.28); }

/* Loading */
#ld {
  position: fixed; inset: 0; background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 18px; z-index: 200; transition: opacity .7s;
}
#ldT { font-size: 10px; letter-spacing: 6px; color: rgba(0,255,180,.75); text-transform: uppercase; }
#ldBar { width: 180px; height: 1px; background: rgba(255,255,255,.07); overflow: hidden; position: relative; }
#ldFill {
  position: absolute; left: -100%; top: 0; bottom: 0; width: 100%;
  background: linear-gradient(90deg, transparent, #00ffb4, transparent);
  animation: sw 1.1s ease-in-out infinite;
}
@keyframes sw { 0%{left:-100%} 100%{left:100%} }
#ldMsg { font-size: 7px; letter-spacing: 3px; color: rgba(255,255,255,.2); text-transform: uppercase; }
</style>
</head>
<body>

<div id="ld">
  <div id="ldT">HOLOGRAM · PARTICLE</div>
  <div id="ldBar"><div id="ldFill"></div></div>
  <div id="ldMsg">Memuat sistem…</div>
</div>

<canvas id="main"></canvas>

<div id="camBox">
  <video id="vid" autoplay muted playsinline></video>
  <canvas id="camOverlay"></canvas>
</div>

<div id="hudTop">
  <div class="tiny">HOLOGRAM · PARTICLE</div>
  <div id="pill">
    <div id="gText">CHAOS</div>
    <div id="gDot"></div>
  </div>
</div>

<div id="hudBot">
  <div class="hints">
    <span class="h">✊ kepal → saturnus</span>
    <span class="h">🖐 buka → chaos</span>
    <span class="h">drag → putar</span>
    <span class="h">cubit/scroll → zoom</span>
  </div>
  <div id="pCount"></div>
</div>

<div id="zoomHud">
  <div id="zBar"><div id="zFill"></div></div>
  <div id="zVal">1.0×</div>
</div>

<!-- MediaPipe only, no Three.js needed -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
/* ══════════════════════════════════════════════════
   HOLOGRAM PARTICLE — Pure Canvas 2D
   No Three.js dependency, works everywhere
   ══════════════════════════════════════════════════ */

const MOBILE = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
const N = MOBILE ? 400 : 650;

/* ── Canvas setup ── */
const cvs = document.getElementById('main');
const ctx = cvs.getContext('2d');

function resize() {
  cvs.width  = window.innerWidth;
  cvs.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const W = () => cvs.width;
const H = () => cvs.height;
const CX = () => cvs.width  / 2;
const CY = () => cvs.height / 2;

/* ── 3D → 2D projection helpers ── */
let rotY = 0, rotX = 0, zoom = 1.0;
let tRotY = 0, tRotX = 0, tZoom = 1.0;

const ZOOM_MIN = 0.25, ZOOM_MAX = 3.5;
const BASE_SCALE = Math.min(W(), H()) * 0.38;

function project(x, y, z) {
  // Rotate around Y
  const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
  let rx = x * cosY + z * sinY;
  let rz = -x * sinY + z * cosY;
  // Rotate around X
  const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
  let ry = y * cosX - rz * sinX;
  rz     = y * sinX + rz * cosX;

  const perspective = 2.5 / (2.5 + rz * 0.3);
  const scale = BASE_SCALE * zoom * perspective;
  return {
    sx: CX() + rx * scale,
    sy: CY() + ry * scale,
    scale: scale,
    depth: rz   // for z-sorting / brightness
  };
}

/* ── Particles ── */
const px   = new Float32Array(N); // 3D position
const py   = new Float32Array(N);
const pz   = new Float32Array(N);
const vvx  = new Float32Array(N); // velocity
const vvy  = new Float32Array(N);
const vvz  = new Float32Array(N);
const th   = new Float32Array(N); // hue
const txp  = new Float32Array(N); // target
const typ  = new Float32Array(N);
const tzp  = new Float32Array(N);
const pSize = new Float32Array(N);

for (let i = 0; i < N; i++) {
  px[i] = (Math.random() - .5) * 2;
  py[i] = (Math.random() - .5) * 2;
  pz[i] = (Math.random() - .5) * 2;
  vvx[i] = (Math.random() - .5) * .006;
  vvy[i] = (Math.random() - .5) * .006;
  vvz[i] = (Math.random() - .5) * .006;
  th[i]  = .45 + Math.random() * .38;       // cyan→blue→violet
  pSize[i] = MOBILE ? (1.5 + Math.random() * 2) : (1.2 + Math.random() * 2.5);
}

/* ── Saturn targets ── */
const CORE = Math.floor(N * 0.38);
const stx  = new Float32Array(N);
const sty  = new Float32Array(N);
const stz  = new Float32Array(N);

function buildSaturn(cx, cy) {
  cx = cx || 0; cy = cy || 0;
  for (let i = 0; i < CORE; i++) {
    const phi   = Math.random() * Math.PI * 2;
    const theta = Math.acos(2 * Math.random() - 1);
    const r     = .38 * Math.cbrt(Math.random());
    stx[i] = cx + r * Math.sin(theta) * Math.cos(phi);
    sty[i] = cy + r * Math.sin(theta) * Math.sin(phi) * .4;
    stz[i] =      r * Math.cos(theta) * .4;
  }
  for (let i = CORE; i < N; i++) {
    const a   = Math.random() * Math.PI * 2;
    const rad = .52 + Math.random() * .38;
    const t   = (Math.random() - .5) * .07;
    stx[i] = cx + rad * Math.cos(a);
    sty[i] = cy + t;
    stz[i] =      rad * Math.sin(a) * .22;
  }
}
buildSaturn(0, 0);

/* ── Mode ── */
let mode = 'FREE';

const gText = document.getElementById('gText');
const gDot  = document.getElementById('gDot');

function setMode(m, cx, cy) {
  if (m === 'FORM' && mode !== 'FORM') buildSaturn(cx || 0, cy || 0);
  mode = m;
  if (m === 'FORM') { gText.textContent = 'SATURNUS'; gText.classList.add('on'); gDot.classList.add('on'); }
  else               { gText.textContent = 'CHAOS';    gText.classList.remove('on'); gDot.classList.remove('on'); }
}

/* ── Orbit controls ── */
let dragging = false, lx = 0, ly = 0;
let pinch0 = 0;

cvs.addEventListener('mousedown', e => { dragging = true; lx = e.clientX; ly = e.clientY; });
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  tRotY += (e.clientX - lx) * .008;
  tRotX += (e.clientY - ly) * .006;
  tRotX = Math.max(-1.3, Math.min(1.3, tRotX));
  lx = e.clientX; ly = e.clientY;
});
window.addEventListener('mouseup', () => dragging = false);
window.addEventListener('wheel', e => {
  e.preventDefault();
  tZoom *= e.deltaY < 0 ? 1.08 : 0.93;
  tZoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, tZoom));
  updateZoomHud();
}, { passive: false });

cvs.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { dragging = true; lx = e.touches[0].clientX; ly = e.touches[0].clientY; }
  else if (e.touches.length === 2) {
    dragging = false;
    pinch0 = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, { passive: true });

cvs.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    tRotY += (e.touches[0].clientX - lx) * .012;
    tRotX += (e.touches[0].clientY - ly) * .009;
    tRotX = Math.max(-1.3, Math.min(1.3, tRotX));
    lx = e.touches[0].clientX; ly = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    const d = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    const delta = d / pinch0;
    tZoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, tZoom * delta));
    pinch0 = d;
    updateZoomHud();
  }
}, { passive: false });

cvs.addEventListener('touchend', e => { if (e.touches.length < 1) dragging = false; }, { passive: true });

function updateZoomHud() {
  const pct = (tZoom - ZOOM_MIN) / (ZOOM_MAX - ZOOM_MIN);
  document.getElementById('zFill').style.height = (pct * 100).toFixed(1) + '%';
  document.getElementById('zVal').textContent   = tZoom.toFixed(1) + '×';
}
updateZoomHud();

/* ── Hue → RGB (inline, no lib needed) ── */
function hslToRgb(h, s, l) {
  let r, g, b;
  if (s === 0) { r = g = b = l; }
  else {
    const q = l < .5 ? l * (1 + s) : l + s - l * s;
    const p = 2 * l - q;
    const hue2 = x => {
      if (x < 0) x += 1; if (x > 1) x -= 1;
      if (x < 1/6) return p + (q - p) * 6 * x;
      if (x < 1/2) return q;
      if (x < 2/3) return p + (q - p) * (2/3 - x) * 6;
      return p;
    };
    r = hue2(h + 1/3); g = hue2(h); b = hue2(h - 1/3);
  }
  return [r * 255 | 0, g * 255 | 0, b * 255 | 0];
}

/* ── Color state per particle (RGB floats 0-255) ── */
const cr = new Float32Array(N);
const cg = new Float32Array(N);
const cb = new Float32Array(N);
for (let i = 0; i < N; i++) {
  const [r, g, b] = hslToRgb(th[i], 1, .70);
  cr[i] = r; cg[i] = g; cb[i] = b;
}

/* ── Render loop ── */
let lastT = 0;
let tick = 0;
// Auto-rotation when not dragging
let autoRotY = 0;

function frame(t) {
  requestAnimationFrame(frame);
  const dt = Math.min((t - lastT) / 16.667, 3);
  lastT = t; tick++;

  /* Smooth camera lerp */
  rotY  += (tRotY - rotY)  * .09;
  rotX  += (tRotX - rotX)  * .09;
  zoom  += (tZoom - zoom)  * .10;

  /* Auto-rotate Y slowly */
  if (!dragging) {
    const spd = mode === 'FORM' ? .005 : .001;
    tRotY += spd * dt;
  }

  /* Clear with trail effect */
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(0, 0, W(), H());

  /* Update & collect particles for depth sort */
  const LF = mode === 'FORM' ? .048 : .026;
  const particles = [];

  for (let i = 0; i < N; i++) {
    if (mode === 'FORM') {
      px[i] += (stx[i] - px[i]) * LF * dt;
      py[i] += (sty[i] - py[i]) * LF * dt;
      pz[i] += (stz[i] - pz[i]) * LF * dt;

      const core = i < CORE;
      const tr = core ? 240 : 20,  tg = core ? 148 : 240, tb = core ? 20  : 204;
      cr[i] += (tr - cr[i]) * .05 * dt;
      cg[i] += (tg - cg[i]) * .05 * dt;
      cb[i] += (tb - cb[i]) * .05 * dt;
    } else {
      vvx[i] += (Math.random() - .5) * .0008;
      vvy[i] += (Math.random() - .5) * .0008;
      vvz[i] += (Math.random() - .5) * .0008;
      vvx[i] *= .993; vvy[i] *= .993; vvz[i] *= .993;

      const B = 1.0;
      if (px[i] >  B) vvx[i] -= .004; if (px[i] < -B) vvx[i] += .004;
      if (py[i] >  B) vvy[i] -= .004; if (py[i] < -B) vvy[i] += .004;
      if (pz[i] >  B) vvz[i] -= .004; if (pz[i] < -B) vvz[i] += .004;

      px[i] += vvx[i] * dt;
      py[i] += vvy[i] * dt;
      pz[i] += vvz[i] * dt;

      const h = ((th[i] + t * .000011) % 1 + 1) % 1;
      const [tr, tg, tb] = hslToRgb(h, 1, .70);
      cr[i] += (tr - cr[i]) * .022 * dt;
      cg[i] += (tg - cg[i]) * .022 * dt;
      cb[i] += (tb - cb[i]) * .022 * dt;
    }

    const proj = project(px[i], py[i], pz[i]);
    particles.push({ sx: proj.sx, sy: proj.sy, sc: proj.scale, depth: proj.depth, idx: i });
  }

  /* Depth sort — far to near */
  particles.sort((a, b) => a.depth - b.depth);

  /* Draw particles */
  for (const p of particles) {
    const i = p.idx;
    const r = cr[i] | 0, g = cg[i] | 0, b = cb[i] | 0;
    const brightness = Math.max(.4, Math.min(1.0, .7 + p.depth * .15));
    const alpha = brightness;
    const radius = pSize[i] * Math.max(.3, p.sc * .012) * zoom;

    ctx.beginPath();
    ctx.arc(p.sx, p.sy, Math.max(0.5, radius), 0, Math.PI * 2);

    /* Glow */
    const grd = ctx.createRadialGradient(p.sx, p.sy, 0, p.sx, p.sy, radius * 2.5);
    grd.addColorStop(0,   `rgba(${r},${g},${b},${(alpha * .95).toFixed(2)})`);
    grd.addColorStop(0.4, `rgba(${r},${g},${b},${(alpha * .5).toFixed(2)})`);
    grd.addColorStop(1,   `rgba(${r},${g},${b},0)`);
    ctx.fillStyle = grd;
    ctx.fill();
  }

  /* Saturn ring highlight when in FORM mode */
  if (mode === 'FORM') {
    ctx.save();
    ctx.globalAlpha = .07;
    ctx.strokeStyle = '#00ffb4';
    ctx.lineWidth = 1;
    const proj0 = project(0, 0, 0);
    const ringR = BASE_SCALE * zoom * .55;
    ctx.beginPath();
    ctx.ellipse(proj0.sx, proj0.sy, ringR, ringR * .22, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}
requestAnimationFrame(frame);

/* ── MediaPipe camera overlay ── */
const vid     = document.getElementById('vid');
const camC    = document.getElementById('camOverlay');
const camX    = camC.getContext('2d');

function resizeCam() { camC.width = camC.offsetWidth; camC.height = camC.offsetHeight; }
resizeCam();
window.addEventListener('resize', resizeCam);

function isFist(lm) {
  let c = 0;
  [[8,6],[12,10],[16,14],[20,18]].forEach(([t, p]) => { if (lm[t].y > lm[p].y) c++; });
  return c >= 3;
}

const ldMsg = document.getElementById('ldMsg');

/* Map hand wrist to 3D coords (-1..1) */
function handTo3D(lm) {
  const wx = -(lm[0].x - .5) * 2 * 0.9;
  const wy = -(lm[0].y - .5) * 2 * 0.7;
  return { x: wx, y: wy };
}

const handsM = new Hands({ locateFile: f => 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/' + f });
handsM.setOptions({
  maxNumHands: 1,
  modelComplexity: MOBILE ? 0 : 1,
  minDetectionConfidence: .60,
  minTrackingConfidence: .55,
});

handsM.onResults(res => {
  camX.clearRect(0, 0, camC.width, camC.height);
  if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
    const lm = res.multiHandLandmarks[0];

    if (typeof drawConnectors !== 'undefined') {
      drawConnectors(camX, lm, HAND_CONNECTIONS, { color: 'rgba(0,255,180,.3)', lineWidth: 1 });
      drawLandmarks(camX, lm, { color: 'rgba(0,255,180,.7)', radius: 2 });
    }

    const { x, y } = handTo3D(lm);
    setMode(isFist(lm) ? 'FORM' : 'FREE', x, y);
  } else {
    setMode('FREE');
  }
});

function fadeOut(el) {
  if (!el) return;
  el.style.opacity = '0';
  setTimeout(() => el.remove(), 750);
}

async function init() {
  ldMsg.textContent = 'Meminta akses kamera…';
  try {
    const mpCam = new Camera(vid, {
      onFrame: async () => { await handsM.send({ image: vid }); },
      width: MOBILE ? 320 : 480,
      height: MOBILE ? 240 : 360,
    });
    ldMsg.textContent = 'Memuat model tangan…';
    await mpCam.start();
    setTimeout(() => fadeOut(document.getElementById('ld')), 2200);
  } catch (e) {
    ldMsg.textContent = 'Kamera tidak tersedia — touch aktif';
    console.warn(e);
    setTimeout(() => fadeOut(document.getElementById('ld')), 1600);
  }
}

document.getElementById('pCount').textContent = N + ' PARTICLES';
init();
</script>
</body>
</html>
