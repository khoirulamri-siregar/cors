<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HOLOGRAM · PARTICLE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;
  font-family:'Courier New',monospace;touch-action:none;user-select:none;}

#c{display:block;position:fixed;inset:0;width:100%!important;height:100%!important;}

#camBox{
  position:fixed;bottom:72px;right:12px;
  width:110px;height:82px;
  border:1px solid rgba(0,255,180,.2);border-radius:6px;
  overflow:hidden;z-index:30;opacity:.6;transition:opacity .3s;
}
#camBox:hover{opacity:.9;}
video,#camOverlay{position:absolute;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
#camOverlay{z-index:2;}

#hudTop{
  position:fixed;top:0;left:0;right:0;padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;z-index:40;pointer-events:none;
}
.tiny{font-size:8px;letter-spacing:4px;color:rgba(255,255,255,.2);text-transform:uppercase;}
#pill{
  display:flex;align-items:center;gap:7px;
  padding:4px 11px;border:1px solid rgba(0,255,180,.12);border-radius:20px;
  background:rgba(0,0,0,.5);backdrop-filter:blur(8px);
}
#gText{font-size:8px;letter-spacing:3px;color:rgba(0,255,180,.4);text-transform:uppercase;transition:all .3s;}
#gText.on{color:#00ffb4;text-shadow:0 0 10px rgba(0,255,180,.8);}
#gDot{width:6px;height:6px;border-radius:50%;background:rgba(0,255,180,.25);transition:all .3s;}
#gDot.on{background:#00ffb4;box-shadow:0 0 8px #00ffb4;}

#hudBot{
  position:fixed;bottom:0;left:0;right:0;padding:10px 16px;
  display:flex;align-items:center;justify-content:space-between;z-index:40;pointer-events:none;
}
.hints{display:flex;gap:12px;flex-wrap:wrap;}
.h{font-size:7px;letter-spacing:1.5px;color:rgba(255,255,255,.18);text-transform:uppercase;}
#pCount{font-size:7px;letter-spacing:2px;color:rgba(0,255,180,.2);}

#scaleHud{
  position:fixed;right:12px;top:50%;transform:translateY(-50%);
  z-index:40;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
#scaleBar{
  width:2px;height:100px;
  background:rgba(255,255,255,.06);border-radius:2px;position:relative;
}
#scaleFill{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(0deg,#00ffb4,rgba(0,255,180,.2));
  border-radius:2px;transition:height .1s;
  height:50%;
}
#scaleVal{font-size:7px;letter-spacing:1px;color:rgba(0,255,180,.3);}

#ld{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;z-index:200;transition:opacity .7s;}
#ldTitle{font-size:10px;letter-spacing:6px;color:rgba(0,255,180,.7);text-transform:uppercase;}
#ldBar{width:180px;height:1px;background:rgba(255,255,255,.07);overflow:hidden;position:relative;}
#ldFill{position:absolute;left:-100%;top:0;bottom:0;width:100%;
  background:linear-gradient(90deg,transparent,#00ffb4,transparent);
  animation:sw 1.1s ease-in-out infinite;}
@keyframes sw{0%{left:-100%}100%{left:100%}}
#ldMsg{font-size:7px;letter-spacing:3px;color:rgba(255,255,255,.18);text-transform:uppercase;}
</style>
</head>
<body>

<div id="ld">
  <div id="ldTitle">HOLOGRAM · PARTICLE</div>
  <div id="ldBar"><div id="ldFill"></div></div>
  <div id="ldMsg">Memuat sistem…</div>
</div>

<canvas id="c"></canvas>

<div id="camBox">
  <video id="vid" autoplay muted playsinline></video>
  <canvas id="camOverlay"></canvas>
</div>

<div id="hudTop">
  <div class="tiny">HOLOGRAM · PARTICLE</div>
  <div id="pill"><div id="gText">CHAOS</div><div id="gDot"></div></div>
</div>

<div id="hudBot">
  <div class="hints">
    <span class="h">✊ kepal → saturnus</span>
    <span class="h">🖐 buka → chaos</span>
    <span class="h">drag → putar</span>
    <span class="h">cubit/scroll → zoom</span>
  </div>
  <div id="pCount"></div>
</div>

<div id="scaleHud">
  <div id="scaleBar"><div id="scaleFill"></div></div>
  <div id="scaleVal">1.0x</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
const MOBILE = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
const N      = MOBILE ? 450 : 720;
const SPREAD = 5.5;
const PR     = Math.min(window.devicePixelRatio, MOBILE ? 1.5 : 2);

/* ── Renderer ── */
const canvas3  = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas: canvas3, antialias: !MOBILE });
renderer.setPixelRatio(PR);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 200);

/* ── Orbit state ── */
let camTheta = 0, camPhi = 0, camR = 7;
let tTheta   = 0, tPhi   = 0, tR  = 7;

function updateCam() {
  camTheta += (tTheta - camTheta) * 0.08;
  camPhi   += (tPhi   - camPhi)   * 0.08;
  camR     += (tR     - camR)     * 0.10;
  tR = Math.max(2, Math.min(18, tR));
  camR = Math.max(1.5, Math.min(20, camR));

  camera.position.x = camR * Math.sin(camTheta) * Math.cos(camPhi);
  camera.position.y = camR * Math.sin(camPhi);
  camera.position.z = camR * Math.cos(camTheta) * Math.cos(camPhi);
  camera.lookAt(0, 0, 0);

  const pct = 1 - (camR - 2) / 16;
  document.getElementById('scaleFill').style.height = Math.max(2, Math.min(100, pct * 100)) + '%';
  document.getElementById('scaleVal').textContent   = (7 / camR).toFixed(1) + 'x';
}

/* ── Particles ── */
const pos = new Float32Array(N * 3);
const col = new Float32Array(N * 3);
const sz  = new Float32Array(N);
const vx  = new Float32Array(N);
const vy  = new Float32Array(N);
const vz  = new Float32Array(N);

const tc = new THREE.Color();

for (let i = 0; i < N; i++) {
  const i3 = i * 3;
  pos[i3]   = (Math.random() - .5) * SPREAD;
  pos[i3+1] = (Math.random() - .5) * SPREAD;
  pos[i3+2] = (Math.random() - .5) * SPREAD;
  vx[i] = (Math.random() - .5) * .016;
  vy[i] = (Math.random() - .5) * .016;
  vz[i] = (Math.random() - .5) * .016;

  tc.setHSL(.45 + Math.random() * .38, 1, .70);
  col[i3] = tc.r; col[i3+1] = tc.g; col[i3+2] = tc.b;
  sz[i]   = MOBILE ? (2.5 + Math.random() * 3) : (2.0 + Math.random() * 3);
}

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
geo.setAttribute('size',     new THREE.BufferAttribute(sz,  1));

const VS = [
  'attribute float size;',
  'attribute vec3 color;',
  'varying vec3 vCol;',
  'uniform float uPR;',
  'void main(){',
  '  vCol = color;',
  '  vec4 mv = modelViewMatrix * vec4(position,1.0);',
  '  gl_PointSize = size * uPR * (300.0 / -mv.z);',
  '  gl_Position  = projectionMatrix * mv;',
  '}'
].join('\n');

const FS = [
  'varying vec3 vCol;',
  'void main(){',
  '  vec2 d = gl_PointCoord - vec2(0.5);',
  '  float r = length(d);',
  '  if(r > 0.5) discard;',
  '  float a = smoothstep(0.5, 0.05, r);',
  '  gl_FragColor = vec4(vCol + vCol * a * 0.4, a);',
  '}'
].join('\n');

const mat = new THREE.ShaderMaterial({
  vertexShader: VS, fragmentShader: FS,
  uniforms: { uPR: { value: PR } },
  transparent: true, depthWrite: false,
  blending: THREE.AdditiveBlending,
  vertexColors: true,
});

const pts = new THREE.Points(geo, mat);
scene.add(pts);
document.getElementById('pCount').textContent = N + ' PARTICLES';

/* ── Saturn targets ── */
const CORE   = Math.floor(N * 0.38);
const satTgt = new Float32Array(N * 3);

function buildSaturn(cx, cy) {
  cx = cx || 0; cy = cy || 0;
  for (let i = 0; i < CORE; i++) {
    const phi   = Math.random() * Math.PI * 2;
    const theta = Math.acos(2 * Math.random() - 1);
    const r     = .6 * Math.cbrt(Math.random());
    const i3 = i * 3;
    satTgt[i3]   = cx + r * Math.sin(theta) * Math.cos(phi);
    satTgt[i3+1] = cy + r * Math.sin(theta) * Math.sin(phi) * .38;
    satTgt[i3+2] =      r * Math.cos(theta) * .38;
  }
  for (let i = CORE; i < N; i++) {
    const a   = Math.random() * Math.PI * 2;
    const rad = .9 + Math.random() * .65;
    const th  = (Math.random() - .5) * .13;
    const i3  = i * 3;
    satTgt[i3]   = cx + rad * Math.cos(a);
    satTgt[i3+1] = cy + th;
    satTgt[i3+2] =      rad * Math.sin(a) * .30;
  }
}
buildSaturn(0, 0);

/* ── Orbit controls ── */
let dragging = false, lx = 0, ly = 0, pinch0 = 0;

canvas3.addEventListener('mousedown', e => { dragging = true; lx = e.clientX; ly = e.clientY; });
window.addEventListener('mousemove',  e => {
  if (!dragging) return;
  tTheta -= (e.clientX - lx) * .009; tPhi += (e.clientY - ly) * .007;
  tPhi = Math.max(-1.3, Math.min(1.3, tPhi));
  lx = e.clientX; ly = e.clientY;
});
window.addEventListener('mouseup', () => dragging = false);
window.addEventListener('wheel', e => { e.preventDefault(); tR += e.deltaY * .007; }, { passive: false });

canvas3.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { dragging = true; lx = e.touches[0].clientX; ly = e.touches[0].clientY; }
  else if (e.touches.length === 2) {
    dragging = false;
    pinch0 = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }
}, { passive: true });

canvas3.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    tTheta -= (e.touches[0].clientX - lx) * .013; tPhi += (e.touches[0].clientY - ly) * .010;
    tPhi = Math.max(-1.3, Math.min(1.3, tPhi));
    lx = e.touches[0].clientX; ly = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    tR += (pinch0 - d) * .025; pinch0 = d;
  }
}, { passive: false });

canvas3.addEventListener('touchend', e => { if (e.touches.length < 1) dragging = false; }, { passive: true });

/* ── Mode state ── */
let mode = 'FREE';
const gText = document.getElementById('gText');
const gDot  = document.getElementById('gDot');

function setMode(m, cx, cy) {
  if (m === 'FORM' && mode !== 'FORM') buildSaturn(cx, cy);
  mode = m;
  if (m === 'FORM') { gText.textContent = 'SATURNUS'; gText.classList.add('on'); gDot.classList.add('on'); }
  else               { gText.textContent = 'CHAOS';    gText.classList.remove('on'); gDot.classList.remove('on'); }
}

/* ── Render loop ── */
const posAttr = geo.attributes.position;
const colAttr = geo.attributes.color;
let lastT = 0;

function animate(t) {
  requestAnimationFrame(animate);
  const dt = Math.min((t - lastT) / 16.667, 3); lastT = t;
  const LF = mode === 'FORM' ? .050 : .028;

  for (let i = 0; i < N; i++) {
    const i3 = i * 3;
    if (mode === 'FORM') {
      pos[i3]   += (satTgt[i3]   - pos[i3])   * LF * dt;
      pos[i3+1] += (satTgt[i3+1] - pos[i3+1]) * LF * dt;
      pos[i3+2] += (satTgt[i3+2] - pos[i3+2]) * LF * dt;

      const core = i < CORE;
      const tr = core ? .95 : .08, tg = core ? .58 : .95, tb = core ? .08 : .80;
      col[i3]   += (tr - col[i3])   * .04 * dt;
      col[i3+1] += (tg - col[i3+1]) * .04 * dt;
      col[i3+2] += (tb - col[i3+2]) * .04 * dt;
    } else {
      vx[i] += (Math.random() - .5) * .0009;
      vy[i] += (Math.random() - .5) * .0009;
      vz[i] += (Math.random() - .5) * .0009;
      vx[i] *= .993; vy[i] *= .993; vz[i] *= .993;

      const B = SPREAD * .52;
      if (pos[i3]   >  B) vx[i] -= .005; if (pos[i3]   < -B) vx[i] += .005;
      if (pos[i3+1] >  B) vy[i] -= .005; if (pos[i3+1] < -B) vy[i] += .005;
      if (pos[i3+2] >  B) vz[i] -= .005; if (pos[i3+2] < -B) vz[i] += .005;

      pos[i3]   += vx[i] * dt;
      pos[i3+1] += vy[i] * dt;
      pos[i3+2] += vz[i] * dt;

      const h = ((.45 + i / N * .38) + t * .000012) % 1;
      tc.setHSL(h, 1, .70);
      col[i3]   += (tc.r - col[i3])   * .02 * dt;
      col[i3+1] += (tc.g - col[i3+1]) * .02 * dt;
      col[i3+2] += (tc.b - col[i3+2]) * .02 * dt;
    }
  }

  posAttr.needsUpdate = true;
  colAttr.needsUpdate = true;

  if (!dragging) pts.rotation.y += (mode === 'FORM' ? .005 : .001) * dt;

  updateCam();
  renderer.render(scene, camera);
}
requestAnimationFrame(animate);

/* ── Resize ── */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ── MediaPipe Hands ── */
const vid   = document.getElementById('vid');
const camC  = document.getElementById('camOverlay');
const camX  = camC.getContext('2d');

function resizeCamC() { camC.width = camC.offsetWidth; camC.height = camC.offsetHeight; }
resizeCamC(); window.addEventListener('resize', resizeCamC);

function isFist(lm) {
  let c = 0;
  [[8,6],[12,10],[16,14],[20,18]].forEach(([t,p]) => { if (lm[t].y > lm[p].y) c++; });
  return c >= 3;
}

const ldMsg = document.getElementById('ldMsg');

const handsM = new Hands({ locateFile: f => 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/' + f });
handsM.setOptions({ maxNumHands: 1, modelComplexity: MOBILE ? 0 : 1, minDetectionConfidence: .60, minTrackingConfidence: .55 });

handsM.onResults(res => {
  camX.clearRect(0, 0, camC.width, camC.height);
  if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
    const lm = res.multiHandLandmarks[0];
    camX.save(); camX.scale(-1,1); camX.translate(-camC.width, 0);
    if (typeof drawConnectors !== 'undefined') {
      drawConnectors(camX, lm, HAND_CONNECTIONS, { color:'rgba(0,255,180,.3)', lineWidth:1 });
      drawLandmarks(camX, lm, { color:'rgba(0,255,180,.7)', radius:2 });
    }
    camX.restore();

    const wx = -(lm[0].x - .5) * 2 * 3.8;
    const wy = -(lm[0].y - .5) * 2 * 2.6;
    setMode(isFist(lm) ? 'FORM' : 'FREE', wx, wy);
  } else { setMode('FREE'); }
});

function fadeOut(el) { if (!el) return; el.style.opacity='0'; setTimeout(() => el.remove(), 750); }

async function init() {
  ldMsg.textContent = 'Meminta akses kamera…';
  try {
    const mpCam = new Camera(vid, {
      onFrame: async () => { await handsM.send({ image: vid }); },
      width: MOBILE ? 320 : 480, height: MOBILE ? 240 : 360,
    });
    ldMsg.textContent = 'Memuat model tangan…';
    await mpCam.start();
    setTimeout(() => fadeOut(document.getElementById('ld')), 2400);
  } catch(e) {
    ldMsg.textContent = 'Kamera tidak tersedia — mode touch aktif';
    setTimeout(() => fadeOut(document.getElementById('ld')), 1600);
  }
}
init();
</script>
</body>
</html>
