<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mobile History Loop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0c0a1e, #1a1040, #2d1b69);
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
            touch-action: manipulation;
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 40px 28px;
            max-width: 440px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
            transition: transform 0.15s ease;
        }

        .icon-big {
            font-size: 4.2rem;
            display: block;
            margin-bottom: 8px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.55);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .highlight {
            color: #a78bfa;
            font-weight: 600;
        }

        .counter-box {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 18px 16px;
            margin: 12px 0 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .counter-label {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
        }

        .counter-number {
            color: #a78bfa;
            font-size: 3.6rem;
            font-weight: 800;
            display: block;
            line-height: 1.1;
            font-variant-numeric: tabular-nums;
        }

        .btn {
            padding: 16px 24px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 60px;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.3);
            width: 100%;
            touch-action: manipulation;
            -webkit-touch-callout: none;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .status-bar {
            margin-top: 16px;
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            background: rgba(167, 139, 250, 0.1);
            color: #a78bfa;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            border: 1px solid rgba(167, 139, 250, 0.1);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .badge.warning {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border-color: rgba(239, 68, 68, 0.15);
        }

        .warning-text {
            margin-top: 18px;
            color: rgba(255, 255, 255, 0.15);
            font-size: 0.7rem;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 16px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <span class="icon-big">📱</span>
        <h1>Loop Trap</h1>
        <p class="subtitle">
            Swipe dari kiri atau tekan tombol <span class="highlight">⬅️ Back</span> di HP kamu
        </p>

        <div class="counter-box">
            <span class="counter-label">Total back gesture</span>
            <span class="counter-number" id="backCounter">0</span>
        </div>

        <button class="btn" id="resetBtn">🔄 Reset & Tetap di Sini</button>

        <div class="status-bar">
            <span class="badge" id="lastStatus">✅ Siap</span>
            <span class="badge warning" id="deviceType">📱 Mobile</span>
        </div>

        <div class="warning-text">
            ⚡ Swipe back / tombol back <strong>tidak akan membawamu keluar</strong>
        </div>
    </div>

    <script>
        (function() {
            // === DETEKSI DEVICE ===
            const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
            const deviceEl = document.getElementById('deviceType');
            if (isMobile) {
                deviceEl.textContent = '📱 HP / iPhone';
            } else {
                deviceEl.textContent = '💻 Desktop';
            }

            // === COUNTER ===
            let backCount = parseInt(localStorage.getItem('mobileLoopCount')) || 0;
            const counterEl = document.getElementById('backCounter');
            const statusEl = document.getElementById('lastStatus');
            counterEl.textContent = backCount;

            // === FUNGSI PUSH STATE ===
            function pushNewState() {
                const stateObj = {
                    t: Date.now(),
                    c: backCount
                };
                history.pushState(stateObj, '', window.location.href);
                statusEl.textContent = '✅ State ditambahkan';
                statusEl.style.color = '#34d399';
                console.log('📌 Push state mobile');
            }

            // === PERANGKAP UTAMA: popstate ===
            // Ini yang menangkap:
            // - Swipe back di iPhone (gestur dari kiri)
            // - Tombol back bawaan Android
            // - Tombol back di browser manapun
            window.addEventListener('popstate', function(event) {
                // Tambah counter
                backCount += 1;
                localStorage.setItem('mobileLoopCount', backCount);
                counterEl.textContent = backCount;

                // Update status
                const gestureType = isMobile ? '👆 Swipe/Back HP' : '⬅️ Tombol Back';
                statusEl.textContent = `${gestureType} terdeteksi! (ke-${backCount})`;
                statusEl.style.color = '#f472b6';

                // Efek visual: card sedikit getar
                const card = document.getElementById('mainCard');
                card.style.transform = 'scale(0.97) rotate(-0.5deg)';
                setTimeout(() => {
                    card.style.transform = '';
                }, 200);

                console.log(`🔁 Back/Swipe! Total: ${backCount}`);

                // ⭐ KRUSIAL: Push state baru biar loop terus
                pushNewState();

                // === TAMBAHAN UNTUK IPHONE ===
                // iPhone kadang butuh sedikit delay biar gestur benar-benar ketangkep
                // Ini sudah aman karena popstate tetap terpicu
            });

            // === INISIALISASI ===
            // Push state pertama
            if (history.state === null) {
                pushNewState();
            } else {
                pushNewState();
            }

            // === TOMBOL RESET ===
            document.getElementById('resetBtn').addEventListener('click', function() {
                backCount = 0;
                localStorage.setItem('mobileLoopCount', '0');
                counterEl.textContent = '0';
                statusEl.textContent = '🔄 Counter direset';
                statusEl.style.color = '#fbbf24';

                // Reset history
                history.replaceState(null, '', window.location.href);
                pushNewState();

                // Efek
                const card = document.getElementById('mainCard');
                card.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    card.style.transform = '';
                }, 200);

                console.log('🔄 Reset mobile loop');
            });

            // === CEGAH RELOAD DI HP (opsional) ===
            // Banyak HP punya gesture refresh, kita cegah sebagian
            let startY = 0;
            document.addEventListener('touchstart', function(e) {
                startY = e.touches[0].clientY;
            });

            document.addEventListener('touchmove', function(e) {
                const deltaY = e.touches[0].clientY - startY;
                // Kalau swipe dari atas (refresh gesture) di browser mobile
                if (deltaY > 80 && window.scrollY === 0) {
                    e.preventDefault();
                    statusEl.textContent = '🚫 Pull-to-refresh dicegah!';
                    statusEl.style.color = '#ef4444';
                    pushNewState();
                }
            }, { passive: false });

            // === CEGAH BACK GESTURE DEFAULT (cara halus) ===
            // Di beberapa browser, kita bisa kasih efek tambahan
            // Tapi popstate sudah cukup ampuh

            console.log('🔥 Mobile History Loop AKTIF!');
            console.log(`📱 Device: ${isMobile ? 'Mobile/iPhone' : 'Desktop'}`);
            console.log('👆 Coba swipe back atau tekan tombol back');

            // === TAMBAHAN: DETEKSI VISIBILITY CHANGE ===
            // Kalau user pindah tab dan balik, tetap aman
            document.addEventListener('visibilitychange', function() {
                if (document.hidden) {
                    console.log('📴 Tab disembunyikan');
                } else {
                    console.log('📱 Tab aktif kembali');
                    // Push state lagi biar aman
                    pushNewState();
                }
            });

        })();
    </script>

</body>
</html>
