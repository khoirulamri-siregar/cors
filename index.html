<!DOCTYPE html>
<html>
<head>
  <title>Gravion Web</title>
  <style>
    body { margin:0; overflow:hidden; background:black; }
    video { display:none; }
  </style>
</head>
<body>

<video id="input_video" autoplay playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/three@0.152/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
let scene, camera, renderer;
let particles = [];
let particleCount = 500;

let mode = "FREE"; // FREE / FORM
let center = {x: 0, y: 0};

init();
animate();

function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 200;

  renderer = new THREE.WebGLRenderer();
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  let geometry = new THREE.BufferGeometry();
  let positions = new Float32Array(particleCount * 3);

  for (let i = 0; i < particleCount; i++) {
    positions[i*3] = (Math.random()-0.5)*400;
    positions[i*3+1] = (Math.random()-0.5)*400;
    positions[i*3+2] = 0;

    particles.push({
      vx: (Math.random()-0.5)*2,
      vy: (Math.random()-0.5)*2,
      tx: 0,
      ty: 0
    });
  }

  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

  let material = new THREE.PointsMaterial({ color: 0xffffff, size: 2 });
  let points = new THREE.Points(geometry, material);
  scene.add(points);

  window.points = points;

  setupHandTracking();
}

function animate() {
  requestAnimationFrame(animate);

  let pos = window.points.geometry.attributes.position.array;

  for (let i = 0; i < particleCount; i++) {

    let px = pos[i*3];
    let py = pos[i*3+1];

    if (mode === "FREE") {
      px += particles[i].vx;
      py += particles[i].vy;
    }

    if (mode === "FORM") {
      px += (particles[i].tx - px) * 0.05;
      py += (particles[i].ty - py) * 0.05;
    }

    pos[i*3] = px;
    pos[i*3+1] = py;
  }

  window.points.geometry.attributes.position.needsUpdate = true;

  renderer.render(scene, camera);
}

// ===== SATURN SHAPE =====
function generateSaturn() {
  for (let i = 0; i < particleCount; i++) {

    let angle = Math.random() * Math.PI * 2;

    if (i < particleCount * 0.4) {
      // inti
      let r = Math.random() * 30;
      particles[i].tx = center.x + r * Math.cos(angle);
      particles[i].ty = center.y + r * Math.sin(angle);
    } else {
      // ring
      let r = 60 + Math.random() * 40;
      particles[i].tx = center.x + r * Math.cos(angle);
      particles[i].ty = center.y + r * 0.4 * Math.sin(angle);
    }
  }
}

// ===== HAND TRACKING =====
function setupHandTracking() {
  const video = document.getElementById('input_video');

  const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });

  hands.setOptions({
    maxNumHands: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.7
  });

  hands.onResults(results => {
    if (results.multiHandLandmarks.length > 0) {
      let lm = results.multiHandLandmarks[0];

      let x = (lm[9].x - 0.5) * 400;
      let y = -(lm[9].y - 0.5) * 400;

      center.x = x;
      center.y = y;

      // deteksi fist sederhana
      let open = lm[8].y < lm[6].y;

      if (!open) {
        mode = "FORM";
        generateSaturn();
      } else {
        mode = "FREE";
      }
    }
  });

  const cam = new Camera(video, {
    onFrame: async () => {
      await hands.send({image: video});
    },
    width: 640,
    height: 480
  });

  cam.start();
}
</script>

</body>
</html>
